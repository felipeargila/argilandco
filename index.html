<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Felipe Argila Experience</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section id="intro" class="screen active">
      <div class="intro-inner">
        <h1>
          <span>Diferenciação é sistema.</span>
        </h1>
        <p class="intro-subtitle">Estrutural, multidisciplinar e atemporal.</p>
        <button id="startBtn" type="button">Avançar</button>
      </div>
    </section>

    <section id="experience" class="screen">
      <div id="message"></div>

      <div id="stage">
        <svg id="symbolSvg" viewBox="0 0 500 500" aria-label="Construção do símbolo Argila&Co">
          <g id="grid">
            <line x1="0" y1="0" x2="500" y2="0" />
            <line x1="0" y1="100" x2="500" y2="100" />
            <line x1="0" y1="200" x2="500" y2="200" />
            <line x1="0" y1="300" x2="500" y2="300" />
            <line x1="0" y1="400" x2="500" y2="400" />
            <line x1="0" y1="500" x2="500" y2="500" />
            <line x1="0" y1="0" x2="0" y2="500" />
            <line x1="100" y1="0" x2="100" y2="500" />
            <line x1="200" y1="0" x2="200" y2="500" />
            <line x1="300" y1="0" x2="300" y2="500" />
            <line x1="400" y1="0" x2="400" y2="500" />
            <line x1="500" y1="0" x2="500" y2="500" />
          </g>

          <g id="targetCircles">
            <circle class="target-circle" data-slot="0" cx="150" cy="150" r="150" />
            <circle class="target-circle" data-slot="1" cx="350" cy="150" r="150" />
            <circle class="target-circle" data-slot="2" cx="350" cy="350" r="150" />
            <circle class="target-circle" data-slot="3" cx="150" cy="350" r="150" />
          </g>

          <g id="slotLabels">
            <text data-label-slot="0" x="150" y="150">ESTRATÉGIA</text>
            <text data-label-slot="1" x="350" y="150">IDENTIDADE</text>
            <text data-label-slot="2" x="350" y="350">EXPERIÊNCIA</text>
            <text data-label-slot="3" x="150" y="350">COMUNICAÇÃO</text>
          </g>

          <g id="finalMark">
            <path id="petalTop" d="M250 38.1966 A150 150 0 0 1 250 261.8034 A150 150 0 0 1 250 38.1966 Z" />
            <path id="petalLeft" d="M38.1966 250 A150 150 0 0 1 261.8034 250 A150 150 0 0 1 38.1966 250 Z" />
            <path id="petalRight" d="M238.1966 250 A150 150 0 0 1 461.8034 250 A150 150 0 0 1 238.1966 250 Z" />
          </g>

          <circle id="zoomCore" cx="250" cy="250" r="8" />
        </svg>
      </div>

      <svg id="piecesSvg" aria-hidden="true"></svg>

      <p id="instruction">Arraste e posicione as esferas.</p>
    </section>

    <section id="home" class="screen">
      <div class="home-inner">
        <h2>Marcas criam realidades.<br>Eu crio marcas.</h2>
        <nav id="mainMenu" aria-label="Menu principal">
          <a href="#solucoes">Soluções</a>
          <a href="#sobre">Sobre</a>
          <a href="#contato">Contato</a>
        </nav>
      </div>
    </section>

    <div id="whiteOut"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
